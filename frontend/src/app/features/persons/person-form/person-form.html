<div class="page-container">
  <div class="page-content">
    <div style="display: flex; align-items: center; gap: 0.5em">
      <button class="btn-icon" (click)="routeToDashboard()">←</button>
      <h1>Person hinzufügen</h1>
    </div>

    <form [formGroup]="formGroup" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="name" class="form-label">Name</label>
        <input type="text" id="name" formControlName="name" placeholder="z.B. Anna" />
        @if (name.invalid && name.touched) {
          <span class="form-error">Name ist erforderlich</span>
        }
      </div>

      <div class="form-group">
        <label for="emoji-list" class="form-label">Emoji</label>
        <div id="emoji-list" class="emoji-grid">
          @for (emoji of emojis; track emoji) {
            <button
              class="emoji-option"
              (click)="selectEmoji(emoji)"
              type="button"
              [class.selected]="selectedEmoji() === emoji"
            >
              {{ emoji }}
            </button>
          }
        </div>
      </div>

      <div class="form-group">
        <label for="date" class="form-label">Datum</label>
        <input type="date" id="date" formControlName="date" [max]="today" />
        @if (date.touched) {
          @if (date.errors?.['required']) {
            <span class="form-error">Datum ist erforderlich</span>
          }
          @if (date.errors?.['max']) {
            <span class="form-error">Datum darf nicht in der Zukunft liegen</span>
          }
        }
      </div>

      <button
        class="btn-primary"
        style="margin-top: var(--space-xl)"
        type="submit"
        [disabled]="isLoading() || formGroup.invalid"
      >
        @if (isLoading()) {
          <span class="spinner"></span>
        } @else {
          Speichern
        }
      </button>
    </form>
  </div>
</div>
